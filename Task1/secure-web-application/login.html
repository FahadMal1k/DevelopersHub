<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <a href="index.html">Home</a>
</div>

<div class="container">
  <h2>Login</h2>

  <input type="text" id="loginUsername" placeholder="Username">
  <input type="password" id="loginPassword" placeholder="Password">

  <button onclick="login()">Login</button>

  <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
  // =====================================================
  // WEEK 2: JWT LOGIN WITH FULL DEBUGGING
  // =====================================================
  async function login() {
    // Get values
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;

    // Log to browser console (F12 -> Console tab)
    console.log('🔵 Login button clicked. Username:', username);

    if (!username || !password) {
      alert('⚠️ Please enter both username and password.');
      return;
    }

    try {
      console.log('🟡 Sending request to /login-jwt...');

      const response = await fetch('/login-jwt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();
      console.log('🟢 Server response:', data);

      if (response.ok) {
        // Save token and user
        localStorage.setItem('jwtToken', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        alert('✅ Login successful! Redirecting...');
        window.location.href = '/dashboard.html';
      } else {
        alert('❌ Login failed: ' + (data.message || 'Invalid credentials'));
      }
    } catch (error) {
      console.error('🔴 Network error:', error);
      alert('❌ Network error. Check if server is running.');
    }
  }
</script>

</body>
</html>
